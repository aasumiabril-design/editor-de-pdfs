<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editor Pro | Adrian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .page-card .action-btns { opacity: 1; }
        @media (min-width: 768px) {
            .page-card .action-btns { opacity: 0; }
            .page-card:hover .action-btns { opacity: 1; }
        }
        .sortable-ghost { opacity: 0.1; transform: scale(0.95); background: #6366f1; }
        #previewModal { display: none; }
        #modalImageContainer { display: flex; justify-content: center; overflow: auto; width: 100%; max-height: 70vh; background: #0f172a; border-radius: 12px; }
        #modalImg { transform-origin: top center; transition: transform 0.1s; max-width: 100%; }
        #pagesGrid { counter-reset: pdf-counter; }
        .page-number::before { counter-increment: pdf-counter; content: counter(pdf-counter); }

        .mode-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .mode-active { 
            border-color: #6366f1 !important; 
            background-color: #f5f7ff !important; 
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.1), 0 4px 6px -2px rgba(99, 102, 241, 0.05);
            transform: translateY(-2px);
        }
        .mode-active .check-icon { display: flex !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-3 md:px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center gap-2">
            <div class="flex items-center gap-2 shrink-0">
                <div class="bg-indigo-600 p-1.5 rounded-lg text-white"><i class="fas fa-magic text-lg"></i></div>
                <h1 class="text-sm md:text-xl font-bold tracking-tight text-slate-800 hidden sm:block">PDF Editor <span class="text-indigo-600">Pro</span></h1>
            </div>
            
            <div class="flex items-center gap-2 flex-1 justify-end">
                <input type="text" id="outputFileName" placeholder="Nombre archivo..." class="px-2 py-2 border border-slate-300 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500 outline-none w-32 md:w-48 transition-all">
                <button id="navSaveBtn" onclick="exportPDF()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 md:px-5 py-2 rounded-lg font-bold text-xs md:text-sm shadow-md transition-all shrink-0">
                    Guardar
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 md:px-6 py-6 md:py-10">
        
        <section class="mb-6 md:mb-8 bg-white p-5 md:p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-xs font-bold text-slate-800 uppercase tracking-wider mb-1">1. Formato de Salida</h2>
                    <p class="text-xs text-slate-400">Tamaño final de las hojas.</p>
                </div>
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-200 w-full md:w-auto">
                    <select id="pageSize" onchange="toggleManualSize()" class="bg-transparent text-sm font-bold px-2 py-1 outline-none text-indigo-600 flex-grow md:flex-grow-0">
                        <option value="original">Original</option>
                        <option value="letter">Carta</option>
                        <option value="legal">Oficio</option>
                        <option value="manual">Personalizado</option>
                    </select>
                    <div id="manualInputs" class="hidden flex items-center gap-1 border-l border-slate-300 pl-2">
                        <input type="number" id="manualW" placeholder="W" class="w-10 text-[10px] p-1.5 border rounded">
                        <input type="number" id="manualH" placeholder="H" class="w-10 text-[10px] p-1.5 border rounded">
                    </div>
                </div>
            </div>
        </section>

        <div id="dropzone" class="bg-white border-2 border-dashed border-indigo-200 rounded-2xl p-8 text-center cursor-pointer hover:border-indigo-500 hover:bg-indigo-50/50 transition-all mb-6 md:mb-8 group shadow-sm">
            <input type="file" id="fileInput" multiple accept=".pdf,image/*" class="hidden" onchange="handleFiles(this.files)">
            <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-plus text-indigo-600 text-lg"></i></div>
            <h3 class="text-sm md:text-lg font-bold text-slate-700">2. Sube tus archivos aquí (PDF y/o Imagenes)</h3>
        </div>

        <div id="modeSelector" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <button onclick="setAppMode('merge')" id="btnModeMerge" class="mode-card p-5 bg-white border border-slate-200 rounded-2xl text-left shadow-sm relative group">
                <div class="check-icon hidden absolute top-2 right-2 w-5 h-5 bg-indigo-600 text-white rounded-full items-center justify-center text-[10px]"><i class="fas fa-check"></i></div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600"><i class="fas fa-layer-group"></i></div>
                    <div>
                        <h4 class="font-bold text-slate-800 text-sm">Unir todo</h4>
                        <p class="text-[10px] text-slate-400">Un solo PDF final.</p>
                    </div>
                </div>
            </button>
            <button onclick="setAppMode('split')" id="btnModeSplit" class="mode-card p-5 bg-white border border-slate-200 rounded-2xl text-left shadow-sm relative group">
                <div class="check-icon hidden absolute top-2 right-2 w-5 h-5 bg-indigo-600 text-white rounded-full items-center justify-center text-[10px]"><i class="fas fa-check"></i></div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600"><i class="fas fa-columns"></i></div>
                    <div>
                        <h4 class="font-bold text-slate-800 text-sm">Separar grupos</h4>
                        <p class="text-[10px] text-slate-400">Varios PDFs numerados.</p>
                    </div>
                </div>
            </button>
        </div>

        <div id="editorContainer" class="hidden border-t border-slate-200 pt-6">
            
            <div id="splitOptions" class="hidden bg-white p-5 rounded-2xl border border-indigo-200 shadow-md mb-8 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Nombre base</label>
                        <input type="text" id="outputFileNameEditor" placeholder="Ej: Factura" class="px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex flex-col gap-1 md:col-span-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Enumeración (#)</label>
                        <div class="flex gap-2">
                            <input type="text" id="enumFormat" value="-pg #" class="px-3 py-2 border border-slate-300 rounded-lg text-xs outline-none focus:ring-2 focus:ring-indigo-500 flex-1">
                            <select id="enumPosition" class="bg-slate-50 border border-slate-300 rounded-lg text-xs px-2 font-bold outline-none">
                                <option value="end">Final</option>
                                <option value="start">Inicio</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col md:flex-row items-center justify-between pt-4 border-t border-slate-100 gap-3">
                    <p class="text-[10px] text-slate-400 italic">Ejemplo: <span id="nameExample" class="font-bold text-indigo-500">...</span></p>
                    <button onclick="splitByRange()" class="w-full md:w-auto bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold text-sm shadow-lg">Descargar Grupos</button>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-bold text-slate-800 uppercase tracking-tight">3. Ordenar páginas</h2>
                <button onclick="clearAll()" class="text-rose-600 text-[10px] font-bold border border-rose-200 px-3 py-1.5 rounded-lg">Limpiar Todo</button>
            </div>
            
            <div id="pagesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-20"></div>
        </div>
    </main>

    <div id="previewModal" class="fixed inset-0 bg-slate-900/98 z-[100] p-4 flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="w-full max-w-5xl flex justify-between items-center mb-4 text-white">
            <div class="flex gap-2">
                <button onclick="zoomIn()" class="bg-slate-800 p-2 rounded-lg"><i class="fas fa-search-plus"></i></button>
                <button onclick="zoomOut()" class="bg-slate-800 p-2 rounded-lg"><i class="fas fa-search-minus"></i></button>
                <button onclick="startCrop()" id="cropBtn" class="bg-indigo-600 px-4 py-2 rounded-lg text-xs font-bold">Recortar</button>
                <button onclick="confirmCrop()" id="confirmCropBtn" class="bg-emerald-600 px-4 py-2 rounded-lg text-xs font-bold hidden">OK</button>
                <button onclick="cancelCrop()" id="cancelCropBtn" class="bg-rose-600 px-4 py-2 rounded-lg text-xs font-bold hidden">X</button>
            </div>
            <button onclick="closePreview()" class="text-white text-3xl">&times;</button>
        </div>
        <div id="modalImageContainer"><img id="modalImg" src=""></div>
        <div id="cropperContainer" class="rounded-xl overflow-hidden"><img id="cropperImg" src=""></div>
    </div>

    <div id="loader" class="hidden fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[200]">
        <div class="bg-white p-6 rounded-2xl flex flex-col items-center shadow-2xl">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-600 border-t-transparent mb-2"></div>
            <p class="text-xs font-bold">Procesando...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let allPages = []; let cropper = null; let currentEditingPageId = null; let currentZoom = 1;
        let currentMode = 'merge';

        const pagesGrid = document.getElementById('pagesGrid');
        const loader = document.getElementById('loader');

        new Sortable(pagesGrid, { animation: 150, ghostClass: 'sortable-ghost', delay: 50, delayOnTouchOnly: true });
        document.getElementById('dropzone').onclick = () => document.getElementById('fileInput').click();

        function setAppMode(mode) {
            currentMode = mode;
            const splitOptions = document.getElementById('splitOptions');
            const navSaveBtn = document.getElementById('navSaveBtn');
            const navNameInput = document.getElementById('outputFileName');
            const btnMerge = document.getElementById('btnModeMerge');
            const btnSplit = document.getElementById('btnModeSplit');

            if (mode === 'split') {
                splitOptions.classList.remove('hidden');
                navSaveBtn.classList.add('hidden');
                navNameInput.classList.add('hidden'); // Ocultar nombre arriba en modo split
                btnSplit.classList.add('mode-active');
                btnMerge.classList.remove('mode-active');
            } else {
                splitOptions.classList.add('hidden');
                navSaveBtn.classList.remove('hidden');
                navNameInput.classList.remove('hidden'); // Mostrar nombre arriba en modo unir
                btnMerge.classList.add('mode-active');
                btnSplit.classList.remove('mode-active');
            }
            updateExample();
        }

        const nameNav = document.getElementById('outputFileName');
        const nameEditor = document.getElementById('outputFileNameEditor');
        [nameNav, nameEditor].forEach(input => {
            input.addEventListener('input', (e) => {
                nameNav.value = e.target.value;
                nameEditor.value = e.target.value;
                updateExample();
            });
        });

        const inputsForExample = ['outputFileNameEditor', 'enumFormat', 'enumPosition'];
        inputsForExample.forEach(id => document.getElementById(id).addEventListener('input', updateExample));

        function updateExample() {
            const name = nameEditor.value || "Nombre";
            const pattern = document.getElementById('enumFormat').value || "#";
            const pos = document.getElementById('enumPosition').value;
            const formatted = pattern.replace('#', '1');
            document.getElementById('nameExample').innerText = pos === 'end' ? `${name}${formatted}.pdf` : `${formatted}${name}.pdf`;
        }

        function toggleManualSize() {
            const val = document.getElementById('pageSize').value;
            document.getElementById('manualInputs').classList.toggle('hidden', val !== 'manual');
        }

        async function handleFiles(files) {
            if (files.length === 0) return;
            loader.classList.remove('hidden');
            document.getElementById('modeSelector').classList.remove('hidden');
            document.getElementById('editorContainer').classList.remove('hidden');
            setAppMode('merge'); 

            for (const file of files) {
                const cleanName = file.name.replace(/\.[^/.]+$/, "");
                if (file.type === "application/pdf") {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({scale: 2.0});
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({canvasContext: context, viewport: viewport}).promise;
                        addPageToGrid(arrayBuffer, i - 1, canvas.toDataURL('image/jpeg', 0.9), "pdf", cleanName);
                    }
                } else if (file.type.startsWith("image/")) {
                    const reader = new FileReader();
                    reader.onload = (e) => addPageToGrid(e.target.result, 0, e.target.result, "image", cleanName);
                    reader.readAsDataURL(file);
                }
            }
            loader.classList.add('hidden');
        }

        function addPageToGrid(originalData, originalIndex, displayData, type, originalName) {
            const pageId = Math.random().toString(36).substr(2, 9);
            allPages.push({ id: pageId, originalData, originalIndex, currentData: displayData, originalCrop: displayData, type, originalName });
            const div = document.createElement('div');
            div.className = 'page-card group relative bg-white border border-slate-200 rounded-xl p-2 shadow-sm';
            div.dataset.id = pageId;
            div.innerHTML = `
                <div class="page-number absolute -top-1.5 -left-1.5 bg-indigo-600 text-white w-5 h-5 rounded flex items-center justify-center text-[9px] font-bold z-10 border border-white"></div>
                <img src="${displayData}" class="w-full h-32 md:h-40 object-contain bg-slate-50 rounded-lg cursor-pointer" onclick="openPreview('${pageId}')">
                <div class="action-btns absolute top-1.5 right-1.5 z-20">
                    <button onclick="event.stopPropagation(); deletePage('${pageId}')" class="w-7 h-7 bg-white text-rose-500 rounded-full shadow-md flex items-center justify-center border border-slate-100"><i class="fas fa-trash-alt text-[10px]"></i></button>
                </div>
                <p class="text-[8px] text-slate-400 mt-2 truncate text-center uppercase font-bold">${originalName}</p>
            `;
            pagesGrid.appendChild(div);
        }

        async function splitByRange() {
            const items = Array.from(pagesGrid.children);
            if (items.length === 0) return;
            const size = parseInt(prompt("¿Cada cuántas páginas?", "1"));
            if (isNaN(size) || size <= 0) return;
            const baseName = nameEditor.value.trim() || "documento";
            const enumPattern = document.getElementById('enumFormat').value || "#";
            const enumPos = document.getElementById('enumPosition').value;
            loader.classList.remove('hidden');
            for (let i = 0; i < items.length; i += size) {
                const chunk = items.slice(i, i + size);
                const subPdf = await PDFLib.PDFDocument.create();
                for (const item of chunk) {
                    const pageObj = allPages.find(p => p.id === item.dataset.id);
                    const imgRes = await fetch(pageObj.currentData);
                    const imgBytes = await imgRes.arrayBuffer();
                    const img = pageObj.currentData.includes("png") ? await subPdf.embedPng(imgBytes) : await subPdf.embedJpg(imgBytes);
                    const page = subPdf.addPage([img.width, img.height]);
                    page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                }
                const pdfBytes = await subPdf.save();
                const partNum = (i/size) + 1;
                const formattedEnum = enumPattern.replace('#', partNum);
                downloadBlob(pdfBytes, enumPos === 'end' ? `${baseName}${formattedEnum}.pdf` : `${formattedEnum}${baseName}.pdf`);
            }
            loader.classList.add('hidden');
        }

        async function exportPDF() {
            const items = Array.from(pagesGrid.children);
            if (items.length === 0) return;
            const fileName = nameNav.value.trim() || "documento_final";
            loader.classList.remove('hidden');
            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                const selection = document.getElementById('pageSize').value;
                let targetSize = null;
                if(selection === 'letter') targetSize = [612, 792];
                else if(selection === 'legal') targetSize = [612, 1008];
                else if(selection === 'manual') {
                    const w = parseFloat(document.getElementById('manualW').value) * 2.83465;
                    const h = parseFloat(document.getElementById('manualH').value) * 2.83465;
                    if(w > 0 && h > 0) targetSize = [w, h];
                }
                for (const item of items) {
                    const pageObj = allPages.find(p => p.id === item.dataset.id);
                    const imgRes = await fetch(pageObj.currentData);
                    const imgBytes = await imgRes.arrayBuffer();
                    const img = pageObj.currentData.includes("png") ? await mergedPdf.embedPng(imgBytes) : await mergedPdf.embedJpg(imgBytes);
                    if (!targetSize) {
                        const newPage = mergedPdf.addPage([img.width, img.height]);
                        newPage.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                    } else {
                        const newPage = mergedPdf.addPage(targetSize);
                        const scale = Math.min(targetSize[0] / img.width, targetSize[1] / img.height) * 0.95;
                        const dWidth = img.width * scale; const dHeight = img.height * scale;
                        newPage.drawImage(img, { x: (targetSize[0] - dWidth) / 2, y: (targetSize[1] - dHeight) / 2, width: dWidth, height: dHeight });
                    }
                }
                downloadBlob(await mergedPdf.save(), `${fileName}.pdf`);
            } catch (e) { console.error(e); }
            loader.classList.add('hidden');
        }

        function downloadBlob(data, name) {
            const blob = new Blob([data], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url; link.download = name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function openPreview(pageId) {
            const pageObj = allPages.find(p => p.id === pageId);
            currentEditingPageId = pageId; currentZoom = 1;
            document.getElementById('modalImg').src = pageObj.currentData;
            document.getElementById('modalImg').style.transform = `scale(1)`;
            document.getElementById('previewModal').style.display = 'flex';
        }

        function startCrop() {
            const pageObj = allPages.find(p => p.id === currentEditingPageId);
            document.getElementById('modalImageContainer').style.display = 'none';
            const cropperImg = document.getElementById('cropperImg');
            cropperImg.src = pageObj.originalCrop;
            document.getElementById('cropperContainer').style.display = 'block';
            document.getElementById('cropBtn').classList.add('hidden');
            document.getElementById('confirmCropBtn').classList.remove('hidden');
            document.getElementById('cancelCropBtn').classList.remove('hidden');
            cropper = new Cropper(cropperImg, { viewMode: 1, autoCropArea: 1 });
        }

        function confirmCrop() {
            if (!cropper) return;
            const croppedDataUrl = cropper.getCroppedCanvas({ imageSmoothingQuality: 'high' }).toDataURL('image/jpeg', 0.95);
            const idx = allPages.findIndex(p => p.id === currentEditingPageId);
            allPages[idx].currentData = croppedDataUrl;
            document.querySelector(`[data-id="${currentEditingPageId}"] img`).src = croppedDataUrl;
            document.getElementById('modalImg').src = croppedDataUrl;
            cancelCrop();
        }

        function cancelCrop() {
            if (cropper) { cropper.destroy(); cropper = null; }
            document.getElementById('cropperContainer').style.display = 'none';
            document.getElementById('modalImageContainer').style.display = 'flex';
            document.getElementById('cropBtn').classList.remove('hidden');
            document.getElementById('confirmCropBtn').classList.add('hidden');
            document.getElementById('cancelCropBtn').classList.add('hidden');
        }

        function zoomIn() { currentZoom += 0.3; updateZoom(); }
        function zoomOut() { currentZoom = Math.max(0.4, currentZoom - 0.3); updateZoom(); }
        function updateZoom() { const img = document.getElementById('modalImg'); img.style.transform = `scale(${currentZoom})`; img.style.maxWidth = currentZoom > 1 ? 'none' : '100%'; }
        function closePreview() { cancelCrop(); document.getElementById('previewModal').style.display = 'none'; }
        function deletePage(id) { document.querySelector(`[data-id="${id}"]`).remove(); }
        function clearAll() { if(confirm("¿Borrar todo?")) { location.reload(); } }
    </script>
</body>
</html>
